# ===== Hash Trading Bot 配置 =====

api:
  # TronGrid API Key（必填，在 https://www.trongrid.io/ 免费申请）
  trongrid_api_key: "8120d99a-60fd-4b4e-b2f7-8881cc4d4b36"
  # TronGrid 节点
  trongrid_endpoint: "https://apilist.tronscan.org"
  # 轮询间隔（秒），Tron 出块 ~3s，建议 2~4s
  poll_interval: 3
  # HTTP 超时时间（秒）
  timeout: 10

filter:
  # 仅统计区块高度为该值倍数的区块
  block_multiple: 20

analyzer:
  # 走势图最多保留多少期
  max_history: 5000
  # 连号判定窗口（用于统计最长连号等）
  streak_window: 100

alert:
  # 开关：检测"单双单双单双..."交叉预警
  alternation_enabled: true
  # 连续交叉到达多少期就触发（>=2），例如 6 表示 单双单双单双
  alternation_threshold: 6
  # 触发后多少期内不再重复提醒（防骚扰）
  cooldown_periods: 3
  # 交叉预警是否播放提示音（本地桌面）
  sound_enabled: true
  # 交叉预警是否推送到手机（需同时配置 push.bark_key）
  bark_enabled: true

push:
  # Bark 手机推送（iOS）配置
  # 1. 在 App Store 下载 Bark，复制首页的设备 Key 到下面
  # 2. 留空则不推送
  bark_key: "eiVDUc5ULCSRZcAFBrHWV9"
  bark_server: "https://api.day.app"
  bark_sound: "alarm"
  bark_group: "hash_alert"

storage:
  # SQLite 文件路径
  db_path: "data/hash_trading.db"

backfill:
  # 启动监控时自动从链上回补历史数据
  enabled: true
  # 回补多少天的数据（首次启动时按此估算起点；断点续跑时忽略）
  days: 3
  # 单次补齐最多取多少期，防止一口气打挂
  max_blocks_per_run: 2000

ui:
  # 走势图一列最多堆叠圆珠数（超过则换列）
  column_max: 5
  # 圆珠直径
  dot_size: 30
  # 列间距
  column_gap: 6

deepseek:
  # DeepSeek AI 预测（OpenAI 兼容 API / 中转站）
  enabled: true
  api_key: ""
  base_url: "http://heibai.natapp1.cc/v1"
  model: "GPT-5.4"
  # API 调用超时（秒）
  timeout: 15
  # 发送给 LLM 的最近期数（利用上下文缓存，前缀越稳定缓存命中率越高）
  max_history: 100
  # 在 ensemble 集成投票中的权重（本地 markov/frequency 各为 1.0）
  weight: 1.5
  # 温度越低越确定性
  temperature: 0.1
